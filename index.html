<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Art Upscaler</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f10;
    --surface: #1a1a1d;
    --surface2: #242428;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.18);
    --accent: #7c5cfa;
    --accent-dim: rgba(124,92,250,0.15);
    --accent-glow: rgba(124,92,250,0.3);
    --text: #f0eff4;
    --text-muted: #7a7a8a;
    --text-dim: #4a4a58;
    --green: #3ddba4;
    --green-dim: rgba(61,219,164,0.12);
    --font-display: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 3rem;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #f0eff4 0%, #7c5cfa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p {
    font-family: var(--font-mono);
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-top: 0.4rem;
    letter-spacing: 0.04em;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 1rem;
    width: 100%;
    max-width: 960px;
    align-items: stretch;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .panel-header {
    padding: 0.9rem 1.2rem 0.7rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
  }

  .panel-dot.accent { background: var(--accent); box-shadow: 0 0 6px var(--accent-glow); }
  .panel-dot.green { background: var(--green); box-shadow: 0 0 6px rgba(61,219,164,0.4); }

  .panel-label {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .panel-body {
    padding: 1.2rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
  }

  .drop-zone {
    width: 100%;
    aspect-ratio: 1;
    max-height: 280px;
    border: 1.5px dashed var(--border-hover);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .drop-zone input[type=file] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-zone canvas, .drop-zone img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    image-rendering: pixelated;
    border-radius: 10px;
  }

  .drop-icon {
    font-size: 2rem;
    opacity: 0.3;
    transition: opacity 0.2s;
  }

  .drop-zone:hover .drop-icon { opacity: 0.6; }

  .drop-hint {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--text-dim);
    text-align: center;
  }

  .meta {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--text-muted);
    text-align: center;
    min-height: 1rem;
  }

  .middle-panel {
    width: 160px;
    flex-shrink: 0;
  }

  .scale-section {
    width: 100%;
  }

  .scale-label {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.5rem;
    text-align: center;
  }

  .scale-display {
    text-align: center;
    font-size: 2.6rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    letter-spacing: -0.04em;
    font-family: var(--font-display);
    margin-bottom: 0.3rem;
  }

  .scale-display span {
    font-size: 1.1rem;
    color: var(--text-muted);
    font-weight: 400;
  }

  .scale-slider {
    width: 100%;
    -webkit-appearance: none;
    height: 4px;
    border-radius: 2px;
    background: var(--surface2);
    outline: none;
    margin: 0.8rem 0 0.5rem;
    cursor: pointer;
    position: relative;
  }

  .scale-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 0 3px var(--accent-dim);
    transition: box-shadow 0.15s;
  }

  .scale-slider::-webkit-slider-thumb:hover {
    box-shadow: 0 0 0 6px var(--accent-dim);
  }

  .scale-presets {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-top: 0.6rem;
  }

  .preset-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    padding: 6px 0;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    text-align: center;
  }

  .preset-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  .preset-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  .divider {
    width: 100%;
    height: 1px;
    background: var(--border);
    margin: 0.8rem 0;
  }

  .process-btn {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: var(--font-display);
    font-size: 0.85rem;
    font-weight: 500;
    padding: 10px 0;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 0.01em;
  }

  .process-btn:hover { opacity: 0.88; }
  .process-btn:active { transform: scale(0.97); }
  .process-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .output-preview {
    width: 100%;
    aspect-ratio: 1;
    max-height: 280px;
    background: var(--surface2);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .output-preview canvas {
    max-width: 100%;
    max-height: 100%;
    image-rendering: pixelated;
    border-radius: 10px;
  }

  .output-placeholder {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--text-dim);
    text-align: center;
  }

  .download-btn {
    width: 100%;
    background: var(--green-dim);
    border: 1px solid rgba(61,219,164,0.25);
    border-radius: 10px;
    color: var(--green);
    font-family: var(--font-display);
    font-size: 0.85rem;
    font-weight: 500;
    padding: 10px 0;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .download-btn:hover { background: rgba(61,219,164,0.2); }
  .download-btn:active { transform: scale(0.97); }
  .download-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .arrow {
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 1.2rem;
    padding: 0 0.3rem;
    align-self: center;
  }

  @media (max-width: 680px) {
    .grid {
      grid-template-columns: 1fr;
      grid-template-rows: auto;
    }
    .middle-panel { width: 100%; }
    .arrow { transform: rotate(90deg); }
  }
</style>
</head>
<body>

<header>
  <h1>Pixel Art Upscaler</h1>
  <p>nearest-neighbor scaling · local processing · no upload</p>
</header>

<div class="grid">

  <!-- INPUT -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-dot accent"></div>
      <span class="panel-label">Input image</span>
    </div>
    <div class="panel-body">
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept="image/*">
        <div class="drop-icon" id="dropIcon">&#9635;</div>
        <div class="drop-hint" id="dropHint">drop image or click to browse</div>
        <canvas id="inputCanvas" style="display:none;"></canvas>
      </div>
      <div class="meta" id="inputMeta"></div>
    </div>
  </div>

  <!-- MIDDLE: SCALE -->
  <div class="panel middle-panel">
    <div class="panel-header">
      <div class="panel-dot"></div>
      <span class="panel-label">Scale</span>
    </div>
    <div class="panel-body">
      <div class="scale-section">
        <div class="scale-label">factor</div>
        <div class="scale-display" id="scaleDisplay">2<span>×</span></div>
        <input type="range" class="scale-slider" id="scaleSlider" min="2" max="16" step="1" value="2">
        <div class="scale-presets">
          <button class="preset-btn active" data-scale="2">2×</button>
          <button class="preset-btn" data-scale="4">4×</button>
          <button class="preset-btn" data-scale="8">8×</button>
          <button class="preset-btn" data-scale="16">16×</button>
        </div>
      </div>
      <div class="divider"></div>
      <div class="scale-section">
        <div class="scale-label">output size</div>
        <div class="meta" id="sizePreview" style="margin:0; font-size: 0.78rem; color: var(--text-muted);">—</div>
      </div>
      <div class="divider"></div>
      <button class="process-btn" id="processBtn" disabled>Upscale</button>
    </div>
  </div>

  <!-- OUTPUT -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-dot green"></div>
      <span class="panel-label">Output</span>
    </div>
    <div class="panel-body">
      <div class="output-preview" id="outputPreview">
        <div class="output-placeholder" id="outputPlaceholder">upscaled image<br>appears here</div>
        <canvas id="outputCanvas" style="display:none;"></canvas>
      </div>
      <div class="meta" id="outputMeta"></div>
      <button class="download-btn" id="downloadBtn" disabled>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M7 1v8M4 6l3 3 3-3M2 11h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Download PNG
      </button>
    </div>
  </div>

</div>

<script>
const fileInput = document.getElementById('fileInput');
const dropZone = document.getElementById('dropZone');
const dropIcon = document.getElementById('dropIcon');
const dropHint = document.getElementById('dropHint');
const inputCanvas = document.getElementById('inputCanvas');
const inputMeta = document.getElementById('inputMeta');
const scaleSlider = document.getElementById('scaleSlider');
const scaleDisplay = document.getElementById('scaleDisplay');
const sizePreview = document.getElementById('sizePreview');
const processBtn = document.getElementById('processBtn');
const outputCanvas = document.getElementById('outputCanvas');
const outputPlaceholder = document.getElementById('outputPlaceholder');
const outputMeta = document.getElementById('outputMeta');
const downloadBtn = document.getElementById('downloadBtn');
const presetBtns = document.querySelectorAll('.preset-btn');

let sourceImage = null;
let currentScale = 2;

function updateScaleUI(val) {
  currentScale = val;
  scaleDisplay.innerHTML = `${val}<span>×</span>`;
  scaleSlider.value = val;
  presetBtns.forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.scale) === val);
  });
  if (sourceImage) updateSizePreview();
}

function updateSizePreview() {
  if (!sourceImage) { sizePreview.textContent = '—'; return; }
  const w = sourceImage.width * currentScale;
  const h = sourceImage.height * currentScale;
  sizePreview.textContent = `${w} × ${h} px`;
}

scaleSlider.addEventListener('input', () => updateScaleUI(parseInt(scaleSlider.value)));

presetBtns.forEach(btn => {
  btn.addEventListener('click', () => updateScaleUI(parseInt(btn.dataset.scale)));
});

function loadImage(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      sourceImage = img;
      const ctx = inputCanvas.getContext('2d');
      inputCanvas.width = img.width;
      inputCanvas.height = img.height;
      ctx.drawImage(img, 0, 0);
      inputCanvas.style.display = 'block';
      dropIcon.style.display = 'none';
      dropHint.style.display = 'none';
      inputMeta.textContent = `${img.width} × ${img.height} px`;
      processBtn.disabled = false;
      updateSizePreview();
      // reset output
      outputCanvas.style.display = 'none';
      outputPlaceholder.style.display = 'flex';
      outputMeta.textContent = '';
      downloadBtn.disabled = true;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

fileInput.addEventListener('change', e => loadImage(e.target.files[0]));

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  loadImage(e.dataTransfer.files[0]);
});

processBtn.addEventListener('click', () => {
  if (!sourceImage) return;
  const scale = currentScale;
  const sw = sourceImage.width;
  const sh = sourceImage.height;
  const dw = sw * scale;
  const dh = sh * scale;

  // Read pixels from input
  const srcCtx = inputCanvas.getContext('2d');
  const srcData = srcCtx.getImageData(0, 0, sw, sh);

  // Draw to output with nearest-neighbor (no smoothing)
  outputCanvas.width = dw;
  outputCanvas.height = dh;
  const dstCtx = outputCanvas.getContext('2d');
  dstCtx.imageSmoothingEnabled = false;

  // Use a temp canvas then scale
  const tmp = document.createElement('canvas');
  tmp.width = sw;
  tmp.height = sh;
  const tmpCtx = tmp.getContext('2d');
  tmpCtx.putImageData(srcData, 0, 0);

  dstCtx.drawImage(tmp, 0, 0, sw, sh, 0, 0, dw, dh);

  outputCanvas.style.display = 'block';
  outputPlaceholder.style.display = 'none';
  outputMeta.textContent = `${dw} × ${dh} px`;
  downloadBtn.disabled = false;
});

downloadBtn.addEventListener('click', () => {
  outputCanvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `upscaled_${currentScale}x.png`;
    a.click();
    URL.revokeObjectURL(a.href);
  }, 'image/png');
});
</script>
</body>
</html>
